services:
  # Backend - Spring Boot
  - type: web
    name: promed-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PORT
        value: 8080

  # Frontend - React/Vite
  - type: web
    name: promed-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: 20

